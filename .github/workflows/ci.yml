name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile Python sources
        run: python -m compileall -q .

      - name: Check public/core.js syntax
        run: node --check public/core.js

      - name: Check public/app.js syntax
        run: node --check public/app.js

      - name: Check scripts/browser_smoke.mjs syntax
        run: node --check scripts/browser_smoke.mjs

      - name: Run test suite
        if: runner.os != 'Windows'
        run: python -m unittest discover -s tests -v

      - name: Run Windows test shard group 1
        if: ${{ runner.os == 'Windows' && !cancelled() }}
        run: python scripts/run_unittest_shards.py --run-group 0

      - name: Run Windows test shard group 2
        if: ${{ runner.os == 'Windows' && !cancelled() }}
        run: python scripts/run_unittest_shards.py --run-group 1

      - name: Run Windows test shard group 3
        if: ${{ runner.os == 'Windows' && !cancelled() }}
        run: python scripts/run_unittest_shards.py --run-group 2
