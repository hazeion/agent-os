name: Limited beta feedback
description: Share your Mentat installation and first-workflow experience.
title: "[Beta feedback]: "
body:
  - type: markdown
    attributes:
      value: |
        Thanks for testing Mentat! Never include credentials, endpoints, hostnames, IP addresses, private network details, private conversations, note contents, personal files, or unrestricted logs. For possible security problems, stop and use a private security advisory instead.
  - type: input
    id: version
    attributes:
      label: Mentat version
      description: Find this in Settings → Help & Diagnostics.
      placeholder: v0.1.0-beta.1-rc.1
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options: [macOS Intel, macOS Apple Silicon with Rosetta, Windows, Linux preview]
    validations:
      required: true
  - type: input
    id: hermes_runtime
    attributes:
      label: Verified Hermes runtime version
      description: Use the version/build from your invitation. Never include its endpoint, hostname, IP address, or credentials.
    validations:
      required: true
  - type: dropdown
    id: install_channel
    attributes:
      label: Install method
      options: [macOS installer, Windows installer, pipx]
    validations:
      required: true
  - type: dropdown
    id: experience
    attributes:
      label: Hermes experience
      options: [New to Hermes, Some experience, Experienced]
    validations:
      required: true
  - type: dropdown
    id: hermes_mode
    attributes:
      label: Hermes connection tested
      options: [Local Hermes, Remote Hermes, Both, Not reached]
    validations:
      required: true
  - type: dropdown
    id: install_result
    attributes:
      label: Installation result
      options: [Worked, Worked after troubleshooting, Blocked]
    validations:
      required: true
  - type: dropdown
    id: maintainer_help
    attributes:
      label: Did installation need maintainer help?
      options: ["No", "Yes"]
    validations:
      required: true
  - type: dropdown
    id: first_workflow_time
    attributes:
      label: Time to first useful workflow
      options: [Under 15 minutes, 15–30 minutes, 31–60 minutes, Over 60 minutes, Not reached]
    validations:
      required: true
  - type: textarea
    id: integrations
    attributes:
      label: Hermes and integration experience
      description: What worked, degraded clearly, or blocked you? Keep private content, endpoints, hostnames, and IP addresses out.
    validations:
      required: true
  - type: textarea
    id: remote_matrix
    attributes:
      label: Remote evidence matrix v1
      description: Follow REMOTE_BETA_MATRIX.md. Replace not-run for every assigned row with pass, pass-with-help, or blocked only after all listed actions and results. Leave unassigned rows as not-run.
      value: |
        Public connection liveness: not-run
        Authenticated readiness and capability discovery: not-run
        Hermes configuration and overview summary: not-run
        Agent Console conversation and streaming: not-run
        Run status, progress, approval, cancellation, and stopping: not-run
        Clarification requests and responses: not-run
        Session list, replay, continuation, and search: not-run
        Read-only agent/profile discovery: not-run
        Skill and toolset visibility: not-run
        Durable Kanban delegation and follow-up: not-run
        Console input attachments and Context Packs: not-run
        Connection setup and local/remote runtime selection: not-run
        Hermes diagnostics: not-run
    validations:
      required: true
  - type: dropdown
    id: recovery
    attributes:
      label: Backup and recovery result
      options: [Passed, Passed with help, Blocked, Not assigned]
    validations:
      required: true
  - type: dropdown
    id: migration
    attributes:
      label: Assigned migration result
      options: [Passed, Passed with help, Blocked, Not assigned or not applicable]
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: What felt easy or confusing?
      description: Include safe reproduction steps for any problem.
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Optional redacted diagnostics
      description: Attach only the ZIP from Settings → Download Diagnostics. Do not attach unrestricted logs.
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed credentials, endpoints, hostnames, IP addresses, private network details, private conversations, note contents, personal files, and other private data.
          required: true
