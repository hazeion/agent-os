<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mentat Sketch — Side Inspector</title>
  <style>
    *{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:#071019;color:#e9f6ff}button{font:inherit} .app{display:grid;grid-template-columns:1.15fr .85fr;min-height:100vh}.queue{padding:28px 24px;border-right:1px solid rgba(110,231,255,.12)}.inspector{padding:28px 24px;background:linear-gradient(180deg,rgba(110,231,255,.05),rgba(157,124,255,.04))}h1,h2,h3,p{margin:0}.eyebrow{font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:#7ed8ff}.hero{margin:10px 0 22px}.hero h1{font-size:30px;line-height:1.1}.hero p{margin-top:8px;color:#98afbf;max-width:60ch}.queue-list{display:grid;gap:12px}.task{width:100%;text-align:left;padding:14px 14px 12px;border:1px solid rgba(255,255,255,.08);border-radius:16px;background:rgba(255,255,255,.03);color:inherit;display:grid;gap:10px;cursor:pointer;transition:.18s ease}.task:hover,.task.active{border-color:rgba(110,231,255,.42);background:rgba(110,231,255,.08);transform:translateY(-1px)}.task-top{display:flex;justify-content:space-between;gap:12px;align-items:start}.task-title{font-weight:700;font-size:16px;line-height:1.3}.pill{padding:6px 9px;border-radius:999px;border:1px solid rgba(255,255,255,.12);font-size:11px;letter-spacing:.08em;text-transform:uppercase;white-space:nowrap}.todo{color:#ffd166;border-color:rgba(255,209,102,.25);background:rgba(255,209,102,.08)}.progress{color:#6ee7ff;border-color:rgba(110,231,255,.25);background:rgba(110,231,255,.08)}.waiting{color:#caa7ff;border-color:rgba(202,167,255,.25);background:rgba(202,167,255,.08)}.task-desc{display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:2;overflow:hidden;color:#aac0cf;line-height:1.45;min-height:2.9em}.meta{font-size:12px;color:#7f94a2}.inspector-card{border:1px solid rgba(255,255,255,.08);border-radius:20px;background:rgba(8,17,27,.68);padding:20px;display:grid;gap:16px;min-height:calc(100vh - 56px);position:sticky;top:28px}.label-row{display:flex;justify-content:space-between;gap:12px;align-items:center}.detail-title{font-size:27px;line-height:1.15}.detail-text{color:#b5c9d6;line-height:1.7}.detail-block{border-top:1px solid rgba(255,255,255,.08);padding-top:14px}.detail-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.stat{border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:12px;background:rgba(255,255,255,.025)}.stat small{display:block;color:#7f94a2;margin-bottom:6px;text-transform:uppercase;letter-spacing:.08em}.actions{display:flex;gap:10px;flex-wrap:wrap}.action{border:1px solid rgba(110,231,255,.24);background:rgba(110,231,255,.08);color:#dff7ff;padding:10px 12px;border-radius:12px}.ghost{background:transparent;border-color:rgba(255,255,255,.12);color:#aac0cf}.inspector-note{font-size:13px;color:#7f94a2}.footer{margin-top:auto;color:#7f94a2;font-size:13px}@media (max-width: 980px){.app{grid-template-columns:1fr}.inspector-card{min-height:auto;position:static}}
  </style>
</head>
<body>
  <div class="app">
    <section class="queue">
      <div class="eyebrow">Variant A</div>
      <div class="hero">
        <h1>Side inspector keeps the queue compact</h1>
        <p>Click a task in the queue. The card stays short, but the full text and task metadata appear in a dedicated inspector on the right.</p>
      </div>
      <div class="queue-list" id="queue"></div>
    </section>
    <aside class="inspector">
      <div class="inspector-card" id="detail"></div>
    </aside>
  </div>
  <script>
    const tasks=[
      {title:'Design task archive + future delete workflow',status:'todo',project:'Mentat',due:'none',summary:'Keep completed work in history for now, then design a later archive/delete flow that preserves trust, avoids accidental loss, and works well with dashboard-native task management.',full:'The archive/delete workflow needs to separate three concepts: completing work, hiding old work from the default queue, and permanently deleting records. A good future version would probably start with archive, keep delete behind a second confirmation step, and make it obvious when a task is merely hidden versus truly gone.',next:'Good long-term home for archive/delete actions.'},
      {title:'Build dashboard-native project and task creation',status:'todo',project:'Mentat',due:'none',summary:'Add local-only create/edit flows for projects and tasks backed by project-owned data files, with validation, safe write-back endpoints, and no Hermes core mutation.',full:'This would turn Mentat from a monitoring shell into a more useful work surface. The main thing to preserve is the boundary: Mentat can write only to project-owned JSON, not to Hermes core files. The detail panel could later become the place where task creation and editing live.',next:'Most likely next Phase 3 feature.'},
      {title:'Design Agent Pulse 2.0 heartbeat model',status:'waiting',project:'Mentat',due:'none',summary:'Turn Agent Pulse from a historical session count into an active write-back heartbeat/status panel.',full:'A future heartbeat model could show running, blocked, done, failed, and needs-user-input states. It would need a project-owned schema, small write-back endpoints, and a way for agents to post lightweight state transitions without touching Hermes internals.',next:'Blocked on deciding the write-back model.'},
      {title:'Polish Google Calendar read-only integration',status:'in progress',project:'Mentat',due:'this week',summary:'Turn the connected Google Calendar source into a useful Today/Calendar experience with better grouping, stale states, and a calmer agenda presentation.',full:'This one is a good example of why detail-on-click helps. The short queue card only needs to help you scan. The inspector can hold the full why, constraints, and next-step text without blowing up the whole queue height.',next:'Continue only after task-detail UX is chosen.'}
    ];
    const cls={todo:'todo','in progress':'progress',waiting:'waiting'};
    let selected=0;
    const q=document.getElementById('queue');
    const d=document.getElementById('detail');
    function render(){
      q.innerHTML=tasks.map((task,i)=>`<button class="task ${i===selected?'active':''}" data-i="${i}"><div class="task-top"><div class="task-title">${task.title}</div><span class="pill ${cls[task.status]||''}">${task.status}</span></div><div class="task-desc">${task.summary}</div><div class="meta">${task.project} · due ${task.due}</div></button>`).join('');
      const task=tasks[selected];
      d.innerHTML=`<div class="label-row"><div><div class="eyebrow">Selected task</div><h2 class="detail-title">${task.title}</h2></div><span class="pill ${cls[task.status]||''}">${task.status}</span></div><div class="detail-text">${task.full}</div><div class="detail-grid detail-block"><div class="stat"><small>Project</small><strong>${task.project}</strong></div><div class="stat"><small>Due</small><strong>${task.due}</strong></div><div class="stat"><small>Next move</small><strong>${task.next}</strong></div><div class="stat"><small>Why this pattern</small><strong>Stable queue + richer details</strong></div></div><div class="actions detail-block"><button class="action">Future: archive</button><button class="action ghost">Future: delete</button></div><div class="footer">Mentat fit: strongest for a command-center workflow because the queue stays scan-friendly while the right rail becomes the long-term task detail surface.</div>`;
      q.querySelectorAll('.task').forEach(btn=>btn.onclick=()=>{selected=Number(btn.dataset.i);render();});
    }
    render();
  </script>
</body>
</html>
